<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operational Maturity Index</title>

<style>
body{
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  margin:0;
  background:#F0EFE4;
  color:#201F20;
}
.container{
  max-width:820px;
  margin:40px auto;
  background:white;
  padding:32px;
  border-radius:16px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}
h1{margin-top:0}
button{
  background:#201F20;
  color:white;
  border:none;
  padding:14px 22px;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}
button:hover{opacity:.9}
.card{
  border:1px solid #CEC5B6;
  border-radius:12px;
  padding:14px;
  margin:10px 0;
  cursor:pointer;
}
.card:hover{background:#fafafa}
input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #CEC5B6;
}
.small{font-size:13px;color:#555746}
.result{
  font-size:38px;
  font-weight:700;
}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>

https://script.google.com/macros/s/AKfycbzlHoTrk3aDOrNWtxWiY922PCzaJlexXCG0WyaoHDTxE66xmvXJYABRNIIGvLpzqDl5fw/exec

const QUESTIONS = [
["workflow","New work arrives through a clear channel"],
["workflow","People know what triggers work to start"],
["workflow","Tasks follow similar steps each time"],
["workflow","Work rarely duplicated or lost"],

["roles","Responsibility for recurring work is clear"],
["roles","Decision authority is understood"],
["roles","Definition of finished is agreed"],

["docs","Processes written somewhere accessible"],
["docs","Documentation updated when changed"],
["docs","New staff could follow instructions"],

["reporting","Evidence captured during work"],
["reporting","Reports use consistent format"],
["reporting","Reporting responsibilities clear"]
];

const SCALE = [
"Not in place",
"Early",
"Developing",
"Established",
"Optimised"
];

let step=0;
let answers={};
let lead={};

function render(){

const app=document.getElementById("app");

if(step===0){
app.innerHTML=`
<h1>Operational Maturity Index</h1>
<p>This 5‑minute diagnostic reveals workflow risks, unclear roles, documentation gaps, and reporting weaknesses.</p>
<p class="small">No preparation required. Answer based on how things really work today.</p>
<button onclick="next()">Start diagnostic</button>
`;
return;
}

if(step===1){

let q=QUESTIONS[Object.keys(answers).length];

if(!q){
step=2; render(); return;
}

let html=`<h2>${q[1]}</h2>`;

SCALE.forEach((s,i)=>{
html+=`<div class="card" onclick="select(${i})">${s}</div>`
});

app.innerHTML=html;
return;
}

if(step===2){

let score=Math.round(
Object.values(answers).reduce((a,b)=>a+b,0)/(QUESTIONS.length*4)*100
);

let weakest="workflow";

let groups={workflow:[],roles:[],docs:[],reporting:[]};

QUESTIONS.forEach((q,i)=>{
groups[q[0]].push(answers[i]);
});

let min=999;

for(let g in groups){
let avg=groups[g].reduce((a,b)=>a+b,0)/groups[g].length;
if(avg<min){min=avg; weakest=g;}
}

app.innerHTML=`
<h2>Your results</h2>
<div class="result">${score}%</div>
<p><b>Weakest area:</b> ${weakest}</p>
<button onclick="capture()">Download report</button>
`;

return;
}

if(step===3){

app.innerHTML=`
<h2>Enter details to download report</h2>
<input placeholder="First name" id="fn"><br><br>
<input placeholder="Last name" id="ln"><br><br>
<input placeholder="Email" id="em"><br><br>
<button onclick="finish()">Generate PDF</button>
`;

}

}

function next(){step=1; render();}

function select(v){
answers[Object.keys(answers).length]=v;
render();
}

function capture(){step=3; render();}

function finish(){

lead.first=document.getElementById("fn").value;
lead.last=document.getElementById("ln").value;
lead.email=document.getElementById("em").value;

let payload={
...lead,
answers:answers
};

if(!SCRIPT_URL.includes("REPLACE")){
fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(payload)});
}

window.print();

}

render();

</script>
</body>
</html>
